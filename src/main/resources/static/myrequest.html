<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Requests</title>
    <link rel="stylesheet" href="css/myrequest.css" />
</head>
<body>
    <div class="page-wrap">
        <section class="content-card">
            <div class="card-header">
                <h2>My Requests</h2>
                <p>Track your submitted requests and their current status.</p>
            </div>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Event / Reason</th>
                            <th>HOD</th>
                            <th>Status</th>
                            <th>End Date</th>
                            <th>Certificate Due</th>
                            <th>Certificate</th>
                        </tr>
                    </thead>
                    <tbody id="requestTable"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="js/myrequest.js"></script>
</body>
</html>
